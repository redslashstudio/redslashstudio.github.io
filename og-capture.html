<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OG</title>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 1200px; height: 630px; overflow: hidden; background: #0A0A0A; }
        .container {
            width: 1200px;
            height: 630px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px 100px;
        }
        .glow {
            position: absolute;
            top: -120px;
            right: -120px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(226, 54, 54, 0.12) 0%, transparent 70%);
        }
        h1 {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 64px;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.08;
            color: #E8E4DF;
            max-width: 800px;
            margin-bottom: 32px;
        }
        .sub {
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            font-weight: 300;
            line-height: 1.5;
            color: #8A857F;
            max-width: 600px;
        }
        .logo {
            position: absolute;
            bottom: 72px;
            right: 100px;
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #E8E4DF;
        }
        .logo .prefix {
            color: #E23636;
            font-weight: 800;
            margin-right: 0.08em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glow"></div>
        <h1>What if you could look as good as you actually are?</h1>
        <p class="sub">Your business does great work. But the website, the brand, the way it shows up — it's not telling that story. Not yet.</p>
        <div class="logo"><span class="prefix">/</span>RedSlash</div>
    </div>
</body>
</html>
